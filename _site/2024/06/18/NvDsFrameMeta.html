          <ul>
  <li><strong>FrameMeta</strong>：FrameMeta 是单个视频帧的元数据。它包含了关于这一帧的详细信息，如检测到的对象、帧编号、流ID等。在一个 BatchMeta 中，可以有多个 FrameMeta，每个 FrameMeta 对应一个视频帧。</li>
</ul>

<p>通过读取<code>NvDsFrameMeta-&gt;source_id</code>可以得到当前frame是来自于哪一个输入源, 通过遍历batchmeta中所有framemeta-&gt;sorce_id, 就可以得到此batch中包含了哪些输入源的数据</p>
