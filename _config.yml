remote_theme: daattali/beautiful-jekyll@6.0.1

###########################################################
### Required options
###########################################################

# Name of website
title: Abi Base

# Your name to show in the footer
author: ABi233

###########################################################
# --- Navigation bar links ---
###########################################################

navbar-links:
  About Me: "aboutme"
  Tags: "tags"

################
# --- Logo --- #
################

# Image to show in the navigation bar - works best with a square image
# Remove this parameter if you don't want an image in the navbar
# avatar: "/assets/img/avatar-icon.png"

# By default, the image is cut into a circle. You can disable this by setting 'round-avatar: false'
round-avatar: true

#####################################
# --- Footer social media links --- #
#####################################

social-network-links:
  github: ABi233
  # email: "someone@example.com"
  # rss: true

###########################
# --- General options --- #
###########################

# Excerpt word length - Truncate the excerpt of each post on the feed page
excerpt_length: 50

# Whether or not to show an excerpt for every blog post in the feed page
feed_show_excerpt: true

# Whether or not to show a list of tags below each post preview in the feed page
feed_show_tags: true

# Add a search button to the navbar
post_search: true

######################################
# --- Colours / background image --- #
######################################

page-col: "#FFFFFF"
text-col: "#404040"
link-col: "#008AFF"
hover-col: "#0085A1"
navbar-col: "#EAEAEA"
navbar-text-col: "#404040"
navbar-border-col: "#DDDDDD"
footer-col: "#EAEAEA"
footer-text-col: "#777777"
footer-link-col: "#404040"
footer-hover-col: "#0085A1"

################
# --- Misc --- #
################

# Ruby Date Format to show dates of posts
date_format: "%B %-d, %Y"

###########################################################
# --- Output options ---
###########################################################

timezone: "Asia/Shanghai"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 10

kramdown:
  input: GFM

# Default YAML values
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false
      social-share: true
      head-extra: post-head-extra.html
  -
    scope:
      path: ""
    values:
      layout: "page"

# Exclude these files from production site
exclude:
  - CHANGELOG.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - Dockerfile

plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
